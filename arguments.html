<!DOCTYPE html>
<html>
    <body>

        <p>Finding the largest number with help of Argument Objects</p>
        <p id="result"></p>
        <script>
            function findMax() {
                var i;
                var max = 0;
                for(i = 0; i <arguments.length; i++) {
                if (arguments[i] > max) {
                        max = arguments[i];
                    }
                    }
                    return max;
                    }

                    document.getElementById("result").innerHTML = findMax(32, 76, 54, 92, 108, 4, 35);
            </script>

    </body>
</html>
