<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript For Loops</h2>
        <p id="demo"></p>
       <script>
        var vegetables = ["cucumber", "tomato", "olive", "lettuce","cabbage", "carrot"];
        var text = "";
        var i;
        for (i = 0; i < vegetables.length; i++) {
            text += vegetables[i] + "<br>";
        }
        document.getElementById("demo").innerHTML = text;
       </script>
    </body>
</html>
