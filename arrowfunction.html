<!DOCTYPE html>
<html>
    <body\>

    <h2>JavaScript Arrow Functions</h2>

    <p>This example shows an Arrow Function with a parameter.</p>

    <p id="result"></p>

    <script>
        const divide = (a,b) => a / b;

        document.getElementById("result").innerHTML = divide(4,6);
    </script>

    </body>
</html>
